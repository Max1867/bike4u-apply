<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bike 4 U — Application</title>
<style>
  :root{--teal:#2EC5B6;--pink:#E91E63;--bg:#141721;--card:#1A1D2B;--line:#2a2f42;--txt:#eef1f7;--mut:#9aa3b5}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:15px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:16px;max-width:560px;margin-inline:auto}
  h1{font-size:22px;margin:8px 0 2px}
  .brand{color:var(--teal);font-weight:800;letter-spacing:.3px;font-size:15px}
  .top{display:flex;justify-content:space-between;align-items:center}
  .langs button{background:none;border:1px solid var(--line);border-radius:8px;font-size:17px;padding:3px 7px;margin-right:6px;cursor:pointer}
  .langs button.on{border-color:var(--teal);background:rgba(46,197,182,.12)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:14px 0}
  .batch{border-color:rgba(233,30,99,.55);background:rgba(233,30,99,.07);font-weight:600;font-size:14px}
  .deal b{color:var(--teal)}
  .deal .row{display:flex;gap:8px;margin:6px 0;align-items:baseline}
  .deal .row span:first-child{color:var(--mut);min-width:96px;font-size:13px;flex:none}
  label{display:block;font-size:13px;color:var(--mut);margin:12px 0 4px}
  input,select,textarea{width:100%;background:#10131c;border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:11px 12px;font-size:15px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal)}
  .req::after{content:" *";color:var(--pink)}
  .check{display:flex;gap:10px;align-items:flex-start;margin:10px 0}
  .check input{width:20px;height:20px;margin-top:2px;flex:none}
  .radio label{color:var(--txt);font-size:15px;margin:0}
  .btn{width:100%;border:0;border-radius:11px;padding:15px;font-size:16px;font-weight:800;color:#fff;background:linear-gradient(90deg,var(--pink),var(--teal));margin-top:16px;cursor:pointer}
  .btn[disabled]{opacity:.5}
  .doc{border:1px dashed var(--line);border-radius:10px;padding:12px;margin:8px 0}
  .doc .st{font-size:12px;color:var(--mut);margin-top:6px}
  .doc .st.ok{color:#34d399}.doc .st.err{color:#f87171}
  .have{color:#34d399;font-size:12px;font-weight:700}
  a{color:var(--teal)}
  .err{color:#f87171;font-size:13px;margin-top:8px;display:none}
  .success{text-align:center;padding:34px 10px;display:none}
  .success h2{color:var(--teal)}
  .tcbox{background:#10131c;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:13px}
  #loading{text-align:center;color:var(--mut);padding:60px 0}
  #closed{text-align:center;padding:80px 0;display:none}
  .ctopt{border:2px solid var(--line);border-radius:12px;padding:13px 14px;margin:9px 0;cursor:pointer}
  .ctopt.on{border-color:var(--teal);background:rgba(46,197,182,.08)}
  .ctopt.na{opacity:.55;cursor:not-allowed}
  .ctopt .ctp{color:var(--teal);font-weight:800;margin-top:2px}
  .ctopt .ctt{color:var(--mut);font-size:12.5px;margin-top:2px}
  .ctopt .ctna{color:#f59e0b;font-size:12px;font-weight:700;margin-top:6px}
  #langGate{display:none;text-align:center;padding:26px 0}
  .gatebtn{display:flex;align-items:center;gap:14px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 18px;margin:10px 0;font-size:17px;color:var(--txt);cursor:pointer;text-align:left}
  .gatebtn:active{border-color:var(--teal)}
</style></head><body>
<div style="display:flex;align-items:center;gap:10px">
  <img src="../logo.png" alt="Bike 4 U" style="height:40px;width:40px;border-radius:10px">
  <div class="brand" style="font-size:20px;background:linear-gradient(135deg,var(--pink),var(--teal));-webkit-background-clip:text;background-clip:text;color:transparent">BIKE 4 U</div>
</div>
<div class="langs" id="langs" style="margin-top:10px"></div>
<div id="loading">…</div>
<div id="closed"><h2>Applications are currently closed.</h2><p>Please check with Bike 4 U on WhatsApp.</p></div>
<div id="langGate">
  <h1 style="font-size:21px;letter-spacing:.5px">CHOOSE YOUR LANGUAGE</h1>
  <p style="color:var(--mut);font-size:13px;margin:6px 0 18px">Choisissez votre langue · Chagua lugha yako · Hitamwo ururimi · Sankhani chilankhulo · Sarudza mutauro</p>
  <div id="gateBtns"></div>
</div>
<div id="app" style="display:none">
<h1 id="pagetitle"></h1>
<p style="color:var(--mut);margin:4px 0 0;font-size:13px" data-t="official"></p>
<div class="card" id="supBanner" style="display:none;border-color:rgba(245,158,11,.55)">
  <h2 style="color:#f59e0b;margin:0 0 6px;font-size:17px"><span id="supName"></span> — <span data-t="needMore"></span></h2>
  <p style="margin:0;white-space:pre-line" id="supReason"></p>
</div>
<div class="card">
  <h3 style="margin:0 0 8px" data-t="chooseBike"></h3>
  <div id="modelCards"></div>
</div>

<div class="card" id="contractCard">
  <h3 style="margin:0 0 8px" data-t="chooseContract"></h3>
  <div id="ctRto" class="ctopt" data-ct="rent_to_own">
    <b data-t="rtoTitle"></b><div class="ctp" id="rtoPrice"></div><div class="ctt" id="rtoTerm"></div>
    <div class="ctna" id="rtoNa" style="display:none" data-t="noRtoStock"></div>
  </div>
  <div id="ctRental" class="ctopt" data-ct="rental_only">
    <b data-t="rentalTitle"></b><div class="ctp" id="rentalPrice"></div><div class="ctt" id="rentalTerm"></div>
    <div class="ctna" id="rentalNa" style="display:none" data-t="noRentalStock"></div>
  </div>
  <div id="stockNote" style="display:none;color:#f59e0b;font-size:12.5px;font-weight:700;margin-top:8px;border:1px solid rgba(245,158,11,.45);border-radius:8px;padding:8px 10px;background:rgba(245,158,11,.07)"></div>
</div>

<form id="f" novalidate>
<div id="mainOnly">
<div class="card">
  <h3 style="margin:0 0 4px" data-t="yourDetails"></h3>
  <label class="req" data-t="firstName"></label><input name="firstName">
  <label class="req" data-t="lastName"></label><input name="lastName">
  <label class="req" data-t="phone"></label>
  <div style="display:flex;gap:8px">
    <select name="phoneCC" style="flex:0 0 128px">
      <option value="+27" selected>🇿🇦 +27</option>
      <option value="+243">🇨🇩 +243</option>
      <option value="+257">🇧🇮 +257</option>
      <option value="+265">🇲🇼 +265</option>
      <option value="+263">🇿🇼 +263</option>
      <option value="+255">🇹🇿 +255</option>
      <option value="+254">🇰🇪 +254</option>
      <option value="+260">🇿🇲 +260</option>
      <option value="+258">🇲🇿 +258</option>
      <option value="+266">🇱🇸 +266</option>
      <option value="+268">🇸🇿 +268</option>
    </select>
    <input name="phone" type="tel" placeholder="73 123 4567" style="flex:1">
  </div>
  <label class="req" data-t="email"></label><input name="email" type="email" placeholder="you@gmail.com">
  <label class="req" data-t="idType"></label>
  <select name="idType">
    <option value="sa_id" data-t="saId"></option>
    <option value="passport" data-t="passport"></option>
    <option value="asylum" data-t="asylum"></option>
  </select>
  <label class="req" data-t="idNumber"></label><input name="idNumber">
  <label class="req" data-t="dob"></label>
  <div style="display:flex;gap:8px">
    <select name="dob_d" style="flex:1"><option value="" data-t="dobDay"></option></select>
    <select name="dob_m" style="flex:1.5"><option value="" data-t="dobMonth"></option></select>
    <select name="dob_y" style="flex:1.2"><option value="" data-t="dobYear"></option></select>
  </div>
  <label class="req" data-t="address"></label><input name="address">
</div>

<div class="card">
  <h3 style="margin:0 0 4px" data-t="deliveryExp"></h3>
  <label class="req" data-t="platformQ"></label>
  <select name="deliveryCompany">
    <option value="" data-t="selectOne"></option>
    <option value="uber">Uber Eats</option><option value="mr_d">Mr D</option>
    <option value="checkers">Checkers Sixty60</option><option value="picup">Picup</option>
    <option value="dash">Dash</option><option value="other">Own / Other</option>
  </select>
  <label class="req" data-t="earningsQ"></label>
  <select name="earnings">
    <option value="" data-t="selectOne"></option>
    <option>Under R1000</option><option>R1000 - R2000</option>
    <option>R2000 - R3500</option><option>Over R3500</option>
  </select>
  <label class="req" data-t="durationQ"></label>
  <select name="duration">
    <option value="" data-t="selectOne"></option>
    <option>Less than 6 months</option><option>6 months - 1 year</option>
    <option>1 - 2 years</option><option>Over 2 years</option>
  </select>
</div>

<div class="card">
  <h3 style="margin:0 0 4px" data-t="referralTitle"></h3>
  <p style="color:var(--mut);font-size:13px;margin:2px 0 0" data-t="referralHint"></p>
  <label class="req" data-t="refName"></label><input name="referredBy">
  <label class="req" data-t="refPhone"></label>
  <div style="display:flex;gap:8px">
    <select name="refCC" style="flex:0 0 128px">
      <option value="+27" selected>🇿🇦 +27</option>
      <option value="+243">🇨🇩 +243</option>
      <option value="+257">🇧🇮 +257</option>
      <option value="+265">🇲🇼 +265</option>
      <option value="+263">🇿🇼 +263</option>
      <option value="+255">🇹🇿 +255</option>
      <option value="+254">🇰🇪 +254</option>
      <option value="+260">🇿🇲 +260</option>
      <option value="+258">🇲🇿 +258</option>
      <option value="+266">🇱🇸 +266</option>
      <option value="+268">🇸🇿 +268</option>
    </select>
    <input name="referredByPhone" type="tel" placeholder="73 123 4567" style="flex:1">
  </div>
</div>

</div>

<div class="card">
  <h3 style="margin:0 0 4px" data-t="docsTitle"></h3>
  <p style="color:var(--mut);font-size:13px;margin:2px 0 8px" data-t="docsHint"></p>
  <p style="color:#f59e0b;font-size:12.5px;font-weight:700;margin:0 0 10px;border:1px solid rgba(245,158,11,.45);border-radius:8px;padding:8px 10px;background:rgba(245,158,11,.07)" data-t="docsForeignNote"></p>
  <div id="docs"></div>
  <div class="check"><input type="checkbox" id="nobank"><label for="nobank" style="margin:0;color:var(--txt)" data-t="noBank"></label></div>
</div>

<div class="card" id="supNote" style="display:none">
  <label data-t="noteLabel"></label>
  <textarea name="note" rows="3" data-tp="notePh"></textarea>
</div>

<div id="mainOnly2">
<div class="card">
  <h3 style="margin:0 0 4px" data-t="specialTitle"></h3>
  <textarea name="special" rows="3" data-tp="specialPh"></textarea>
</div>

<div class="card">
  <div id="tcsOnly">
    <h3 style="margin:0 0 8px" data-t="tcsTitle"></h3>
    <div class="tcbox"><span data-t="tcsRead"></span><br>
    <a id="tcslink" href="#" target="_blank" rel="noopener"><b data-t="tcsOpen"></b></a></div>
    <div class="check"><input type="checkbox" id="tc"><label for="tc" style="margin:0;color:var(--txt)" class="req" data-t="tcsAccept"></label></div>
  </div>
  <div id="rentalOnly" style="display:none">
    <h3 style="margin:0 0 8px" data-t="rentalCondTitle"></h3>
    <div class="check"><input type="checkbox" id="rfines"><label for="rfines" style="margin:0;color:var(--txt)" class="req" data-t="rentalFinesAck"></label></div>
    <div class="check"><input type="checkbox" id="raccid"><label for="raccid" style="margin:0;color:var(--txt)" class="req" data-t="rentalAccidentAck"></label></div>
  </div>
  <div class="check"><input type="checkbox" id="mnt"><label for="mnt" style="margin:0;color:var(--txt)" class="req" data-t="maintAck"></label></div>
  <div class="check"><input type="checkbox" id="drv"><label for="drv" style="margin:0;color:var(--txt)" class="req" data-t="drivingAck"></label></div>
</div>
</div>

<input name="website" style="display:none" tabindex="-1" autocomplete="off">
<div class="err" id="err"></div>
<button class="btn" id="go" type="submit"></button>
<p style="color:var(--mut);font-size:12px;text-align:center" data-t="privacy"></p>
</form>

<div class="success" id="done">
  <h2 id="donetitle"></h2>
  <p id="donemsg"></p>
</div>
</div>

const LANGS=[["en","🇬🇧","English"],["fr","🇨🇩","Français"],["sw","🇹🇿","Kiswahili"],["rn","🇧🇮","Kirundi"],["ny","🇲🇼","Chichewa"],["sn","🇿🇼","Shona"]];
let T = I18N.en;
let SUP = null;        // {token, existing:[...]} when opened via personal link
let CT = null;         // chosen contract type
let MODEL = null;      // chosen bike model (StockModel)
let MODELS = [];
let CAMPAIGN = "";

const DOCS = [
  {type:"id_document", key:"d_id", required:true},
  {type:"drivers_license", key:"d_lic", required:true},
  {type:"bank_statement", key:"d_bank", required:true},
  {type:"work_permit", key:"d_permit", required:false},
];

function buildDocs(){
  const docsDiv=document.getElementById("docs");
  docsDiv.innerHTML="";
  for (const d of DOCS) {
    const have = SUP && (SUP.existing.includes(d.type) || (d.type==="id_document" && SUP.existing.includes("passport_asylum")));
    docsDiv.insertAdjacentHTML("beforeend",
      '<div class="doc" id="doc_'+d.type+'"><b>'+T[d.key]+'</b>'+(d.required&&!have?' <span style="color:#E91E63">*</span>':'')+
      (have?' <span class="have">'+T.already+'</span>':'')+
      '<input type="file" accept="image/*,application/pdf" data-type="'+d.type+'" style="margin-top:8px">'+
      '<div class="st" id="st_'+d.type+'"></div></div>');
  }
  document.getElementById("doc_bank_statement").style.display=document.getElementById("nobank").checked?"none":"block";
}

function applyLang(lang){
  T = I18N[lang] || I18N.en;
  try{localStorage.setItem("b4u_lang",lang);}catch(_){}
  for(const el of document.querySelectorAll("[data-t]")) el.textContent = T[el.dataset.t] ?? el.textContent;
  for(const el of document.querySelectorAll("[data-tp]")) el.placeholder = T[el.dataset.tp] ?? "";
  document.getElementById("pagetitle").textContent = SUP ? T.completeTitle : T.title;
  const go=document.getElementById("go");
  if(!go.disabled) go.textContent = SUP ? T.send : T.submit;
  document.getElementById("donetitle").textContent = SUP ? T.supSuccessTitle : T.successTitle;
  document.getElementById("donemsg").textContent = SUP ? T.supSuccessBody : T.successBody;
  if (typeof MODELS !== "undefined" && MODELS.length && document.getElementById("modelCards").children.length) {
    const wrap = document.getElementById("modelCards");
    for (let i=0;i<wrap.children.length;i++){
      const priceLine = wrap.children[i].querySelector(".ctp");
      if (priceLine) priceLine.textContent = (T.availN||"{n} available").replace("{n}", MODELS[i].total);
    }
  }
  const lw=document.getElementById("langs");
  lw.innerHTML="";
  for(const [code,flag] of LANGS){
    const b=document.createElement("button");
    b.type="button";b.textContent=flag;if(code===lang)b.className="on";
    b.onclick=()=>applyLang(code);lw.appendChild(b);
  }
  buildDocs();
}

async function init(){
  const t = new URLSearchParams(location.search).get("t");
  let state;
  // retry transient failures — "closed" must only ever mean genuinely closed
  for(let attempt=1;attempt<=4;attempt++){
  try{
    const r = await fetch(API + "?state=1&v=standing" + (t ? "&t="+encodeURIComponent(t) : ""));
    state = await r.json();
    if(!r.ok || (!state.ok && state.error === "temporary")){ throw new Error("retry"); }
    break;
  }catch(_){
    if(attempt===4){
      document.getElementById("loading").textContent = "Could not load — please check your connection and reopen the link.";
      return;
    }
    await new Promise(r2=>setTimeout(r2, 1500*attempt));
  }
  }
  document.getElementById("loading").style.display="none";
  if(!state.ok && state.error === "invalid_token"){
    const c=document.getElementById("closed");
    c.innerHTML="<h2>This link is not valid.</h2><p>Please use the latest link Bike 4 U sent you on WhatsApp.</p>";
    c.style.display="block";return;
  }
  if(!state.ok || state.open !== true){
    document.getElementById("closed").style.display="block";return;
  }
  CAMPAIGN = "standing";
  MODELS = (state.stock && state.stock.models) || [];
  document.getElementById("rtoPrice").textContent = state.standing.rto_price;
  document.getElementById("rtoTerm").textContent = state.standing.rto_term;
  document.getElementById("rentalPrice").textContent = state.standing.rental_price;
  document.getElementById("rentalTerm").textContent = state.standing.rental_term;

  function kmSummary(kms){
    const fresh = kms.filter(k=>k<1000).length;
    const used = kms.filter(k=>k>=1000).map(k=>k.toLocaleString("en-ZA")+" km");
    const parts = [];
    if (fresh>0) parts.push(fresh+" × 0 km (new)");
    parts.push(...used.slice(0,4));
    if (used.length>4) parts.push("…");
    return parts.join(" · ");
  }
  function aggRto(){ return MODELS.reduce((t,m)=>t+m.rto,0); }
  function aggRental(){ return MODELS.reduce((t,m)=>t+m.rental,0); }
  function applyModelToContracts(){
    // no model chosen = fine (Max assigns the unit) — contracts then use
    // total stock across all models
    for (const [id, count, naId] of [["ctRto", MODEL?MODEL.rto:aggRto(), "rtoNa"], ["ctRental", MODEL?MODEL.rental:aggRental(), "rentalNa"]]) {
      const el = document.getElementById(id);
      el.classList.remove("on");
      if (count === 0) { el.classList.add("na"); document.getElementById(naId).style.display = "block"; }
      else { el.classList.remove("na"); document.getElementById(naId).style.display = "none"; }
    }
    CT = null;
    document.getElementById("stockNote").style.display = "none";
  }
  function renderModels(){
    const wrap = document.getElementById("modelCards");
    wrap.innerHTML = "";
    for (const m of MODELS) {
      const div = document.createElement("div");
      div.className = "ctopt" + (MODEL && MODEL.name === m.name ? " on" : "");
      div.innerHTML = "<b>"+m.name+"</b><div class=\"ctp\">"+(T.availN||"{n} available").replace("{n}", m.total)+"</div>"+
        "<div class=\"ctt\">"+kmSummary(m.kms)+"</div>";
      div.addEventListener("click", () => { MODEL = m; renderModels(); applyModelToContracts(); });
      wrap.appendChild(div);
    }
  }
  renderModels();
  applyModelToContracts();

  for (const id of ["ctRto", "ctRental"]) {
    const el = document.getElementById(id);
    el.addEventListener("click", () => {
      if (el.classList.contains("na")) return;
      CT = el.dataset.ct;
      document.getElementById("ctRto").classList.remove("on");
      document.getElementById("ctRental").classList.remove("on");
      el.classList.add("on");
      // rental has its own conditions; the RTO contract T&Cs don't apply
      document.getElementById("tcsOnly").style.display = CT === "rental_only" ? "none" : "block";
      document.getElementById("rentalOnly").style.display = CT === "rental_only" ? "block" : "none";
      const n = CT === "rent_to_own" ? (MODEL?MODEL.rto:aggRto()) : (MODEL?MODEL.rental:aggRental());
      const note = document.getElementById("stockNote");
      if (n <= 5) { note.textContent = (T.lowStock || "").replace("{n}", n); note.style.display = "block"; }
      else note.style.display = "none";
    });
  }
  document.getElementById("tcslink").href = API + "?tcs=1";
  if(t && state.sup){
    SUP = { token: t, existing: state.sup.existing || [] };
    document.getElementById("supName").textContent = "Hi " + state.sup.firstName;
    document.getElementById("supBanner").style.display="block";
    document.getElementById("supNote").style.display="block";
    document.getElementById("mainOnly").style.display="none";
    document.getElementById("mainOnly2").style.display="none";
  }
  window.__supReason = state.sup ? state.sup.reason : null;
  // Language gate first (Max: the link must open on CHOOSE YOUR LANGUAGE,
  // flags + names, before anything else — flags stay on top afterwards).
  const gate=document.getElementById("langGate");
  const gb=document.getElementById("gateBtns");
  gb.innerHTML="";
  for(const [code,flag,name] of LANGS){
    const b=document.createElement("button");
    b.type="button";b.className="gatebtn";
    b.innerHTML='<span style="font-size:26px">'+flag+'</span><b>'+name+'</b>';
    b.onclick=()=>{
      gate.style.display="none";
      document.getElementById("app").style.display="block";
      applyLang(code);
      if(SUP){
        const pr=document.getElementById("supReason");
        pr.textContent = window.__supReason || T.needMoreDefault;
      }
      window.scrollTo({top:0});
    };
    gb.appendChild(b);
  }
  gate.style.display="block";
}

async function shrink(file){
  if(!file.type.startsWith("image/")||file.size<1500000) return file;
  try{
    const img=await createImageBitmap(file);
    const s=Math.min(1,1600/Math.max(img.width,img.height));
    const cv=document.createElement("canvas");cv.width=img.width*s;cv.height=img.height*s;
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    const blob=await new Promise(r=>cv.toBlob(r,"image/jpeg",0.8));
    return blob&&blob.size<file.size?new File([blob],file.name.replace(/\.[^.]+$/,".jpg"),{type:"image/jpeg"}):file;
  }catch(_){return file;}
}

async function uploadDoc(token,type,file){
  const stId=type==="passport_asylum"?"id_document":type;
  const st=document.getElementById("st_"+stId);
  st.className="st";st.textContent=T.uploading;
  const f=await shrink(file);
  if(f.size>8*1024*1024){st.className="st err";st.textContent=T.tooBig;return false;}
  for(let a=0;a<2;a++){
    try{
      const r=await fetch(API+"?action=upload&t="+token+"&type="+type+"&name="+encodeURIComponent(f.name),
        {method:"POST",headers:{"Content-Type":f.type||"application/octet-stream"},body:f});
      const d=await r.json();
      if(d.ok){st.className="st ok";st.textContent=T.uploaded;return true;}
      st.className="st err";st.textContent=d.error||T.upFailed;
    }catch(_){st.className="st err";st.textContent=T.netRetry;}
  }
  return false;
}

const done=new Set();
document.getElementById("f").addEventListener("submit", async (ev)=>{
  ev.preventDefault();clearErr();
  const F=ev.target, btn=document.getElementById("go");
  const files={};let idType="sa_id";
  for(const inp of document.querySelectorAll('input[type=file]')){
    if(inp.files[0]) files[inp.dataset.type]=inp.files[0];
  }
  const nobank=document.getElementById("nobank").checked;

  let token=SUP&&SUP.token;
  if(!SUP&&!window.__token){
    const v=n=>((F[n]&&F[n].value)||"").trim();
    idType=v("idType");
    const dobStr = v("dob_y")&&v("dob_m")&&v("dob_d") ? v("dob_y")+"-"+v("dob_m")+"-"+v("dob_d") : "";
    if(!v("firstName")||!v("lastName")||!v("phone")||!v("email")||!v("idNumber")||!dobStr||!v("address")
       ||!v("deliveryCompany")||!v("earnings")||!v("duration"))
      return err(T.errRequired);
    if(!/^\S+@\S+\.\S+$/.test(v("email"))) return err(T.errEmail);
    // enforce +countrycode format (Max), default +27; strip leading 0
    let natNum=v("phone").replace(/[^0-9]/g,"").replace(/^0+/,"");
    const fullPhone=v("phoneCC")+natNum;
    if(natNum.length<7||natNum.length>10) return err(T.errPhone);
    let refNat=v("referredByPhone").replace(/[^0-9]/g,"").replace(/^0+/,"");
    const refFull=v("refCC")+refNat;
    if(!v("referredBy")||refNat.length<7||refNat.length>10) return err(T.errReferral);
    if(!CT) return err(T.errContract);
    if(CT==="rent_to_own" && !document.getElementById("tc").checked) return err(T.errTcs);
    if(CT==="rental_only" && (!document.getElementById("rfines").checked || !document.getElementById("raccid").checked)) return err(T.errRentalAcks);
    if(!document.getElementById("mnt").checked) return err(T.errMaint);
    if(!document.getElementById("drv").checked) return err(T.errDriving);
    if(!files.id_document) return err(T.errIdDoc);
    if(!files.drivers_license) return err(T.errLicense);
    if(!files.bank_statement&&!nobank) return err(T.errBank);

    btn.disabled=true;btn.textContent=T.submitting;
    const payload={action:"submit",campaign:CAMPAIGN,website:v("website"),
      firstName:v("firstName"),lastName:v("lastName"),phone:fullPhone,email:v("email"),
      idType:idType,idNumber:v("idNumber"),dob:dobStr,address:v("address"),
      deliveryCompany:v("deliveryCompany"),earnings:v("earnings"),duration:v("duration"),
      referredBy:v("referredBy"),referredByPhone:refFull,
      contractType:CT,model:MODEL?MODEL.name:null,rentalAcks:CT==="rental_only"?(document.getElementById("rfines").checked&&document.getElementById("raccid").checked):undefined,noBankAccount:nobank,maintenanceAck:document.getElementById("mnt").checked,drivingAck:document.getElementById("drv").checked,special:v("special"),lang:localStorage.getItem("b4u_lang")||"en"};
    let d;
    try{
      const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      d=await r.json();
    }catch(_){btn.disabled=false;btn.textContent=T.submit;return err(T.errNetwork);}
    if(!d.ok){btn.disabled=false;btn.textContent=T.submit;return err(d.error==="wa_unreachable"?T.errWaPhone:(d.error||T.errNetwork));}
    window.__token=d.token;
  } else if(!SUP){
    idType=((F.idType&&F.idType.value)||"sa_id");
  }
  token=token||window.__token;

  if(SUP){
    btn.disabled=true;btn.textContent=T.submitting;
    const note=(F.note&&F.note.value||"").trim();
    if(note&&!window.__notesent){
      try{await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"note",t:token,note:note})});window.__notesent=true;}catch(_){}
    }
    if(Object.keys(files).length===0&&!note){btn.disabled=false;btn.textContent=T.send;return err(T.errAttach);}
  }

  btn.disabled=true;btn.textContent=T.uploadingBtn;
  let allOk=true;
  for(const [type,file] of Object.entries(files)){
    const realType=(type==="id_document"&&idType!=="sa_id")?"passport_asylum":type;
    if(done.has(realType)) continue;
    const ok=await uploadDoc(token,realType,file);
    if(ok) done.add(realType); else allOk=false;
  }
  if(!allOk){
    btn.disabled=false;btn.textContent=T.retryBtn;
    return err(T.errSomeDocs);
  }
  document.getElementById("f").style.display="none";
  document.getElementById("done").style.display="block";
  window.scrollTo({top:0,behavior:"smooth"});
});
</script>
</body></html>
